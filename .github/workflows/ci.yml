name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: http://127.0.0.1:4173
      PUBLIC_CONVEX_URL: http://127.0.0.1:3210
      PUBLIC_CONVEX_SITE_URL: http://127.0.0.1:3211
      BETTER_AUTH_URL: http://127.0.0.1:4173
      PUBLIC_ALLOWED_SIGNUPS: 'true'
      BETTER_AUTH_SECRET: test-secret-for-ci-only-32-chars
      PROFILE_IMAGE_SIGNING_SECRET: test-secret-for-ci-only-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Typecheck
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Coverage
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: End-to-end tests
        run: bun run test:e2e
