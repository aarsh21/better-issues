services:
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    volumes:
      - convex_data:/convex/data
      - convex_admin:/admin
    environment:
      - CONVEX_CLOUD_ORIGIN=${PUBLIC_CONVEX_URL:-http://localhost:3210}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-http://localhost:3211}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      # Better Auth is a large bundle — increase V8 isolate memory limits
      - ISOLATE_MAX_USER_HEAP_SIZE=268435456
      - ISOLATE_MAX_HEAP_EXTRA_SIZE=67108864
    entrypoint: ["sh", "-c", "./generate_admin_key.sh | tail -1 > /admin/key && exec ./run_backend.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      start_period: 10s
    restart: unless-stopped

  convex-deploy:
    build:
      context: .
      target: deploy
    volumes:
      - convex_admin:/admin
    environment:
      - CONVEX_SELF_HOSTED_URL=http://convex:3210
      - SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      - BETTER_AUTH_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ALLOWED_SIGNUPS=${PUBLIC_ALLOWED_SIGNUPS:-true}
    depends_on:
      convex:
        condition: service_healthy

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://convex:3210
    depends_on:
      convex:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      target: runtime
      args:
        - PUBLIC_CONVEX_URL=${PUBLIC_CONVEX_URL:-http://localhost:3210}
        - PUBLIC_CONVEX_SITE_URL=${CONVEX_SITE_ORIGIN:-http://localhost:3211}
        - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
        - PUBLIC_ALLOWED_SIGNUPS=${PUBLIC_ALLOWED_SIGNUPS:-true}
    environment:
      - NODE_ENV=production
      - ORIGIN=${PUBLIC_SITE_URL:-http://localhost:3000}
      # ── Convex ──────────────────────────────────────
      - PUBLIC_CONVEX_URL=${PUBLIC_CONVEX_URL:-http://localhost:3210}
      - PUBLIC_CONVEX_SITE_URL=http://convex:3211
      - CONVEX_URL=http://convex:3210
      # ── Better Auth ─────────────────────────────────
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      - SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      # ── App ─────────────────────────────────────────
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      - PUBLIC_ALLOWED_SIGNUPS=${PUBLIC_ALLOWED_SIGNUPS:-true}
    depends_on:
      convex-deploy:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  convex_data:
  convex_admin:
