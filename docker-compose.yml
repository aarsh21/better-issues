services:
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex_data:/convex/data
    environment:
      - CONVEX_CLOUD_ORIGIN=${PUBLIC_CONVEX_URL:-http://localhost:3210}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-http://localhost:3211}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      start_period: 10s
    restart: unless-stopped

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://convex:3210
    depends_on:
      convex:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - ORIGIN=${PUBLIC_SITE_URL:-http://localhost:3000}
      # ── Convex ──────────────────────────────────────
      - PUBLIC_CONVEX_URL=${PUBLIC_CONVEX_URL:-http://localhost:3210}
      - PUBLIC_CONVEX_SITE_URL=http://convex:3211
      # ── Better Auth ─────────────────────────────────
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      - SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      # ── App ─────────────────────────────────────────
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3000}
      - PUBLIC_ALLOWED_SIGNUPS=${PUBLIC_ALLOWED_SIGNUPS:-true}
    depends_on:
      convex:
        condition: service_healthy
    restart: unless-stopped

volumes:
  convex_data:
