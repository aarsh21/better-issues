services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    networks:
      - dokploy-network
    expose:
      - "3210"
      - "3211"
    volumes:
      - data:/convex/data
    environment:
      INSTANCE_NAME: convex-prod
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      CONVEX_CLOUD_ORIGIN: https://convex.hyorinmaru.me
      CONVEX_SITE_ORIGIN: https://convex.hyorinmaru.me
      RUST_LOG: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    networks:
      - dokploy-network
    expose:
      - "6791"
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: https://convex.hyorinmaru.me
      NEXT_PUBLIC_SITE_URL: https://convex-dashboard.hyorinmaru.me
    depends_on:
      backend:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CONVEX_URL: https://convex.hyorinmaru.me
        NEXT_PUBLIC_CONVEX_SITE_URL: https://convex.hyorinmaru.me
    restart: unless-stopped
    labels:
      # Traefik: route issues domain to web; all paths (incl. /api/auth) must reach this container
      - "traefik.enable=true"
      - "traefik.http.routers.better-issues-web.rule=Host(`issues.hyorinmaru.me`)"
      - "traefik.http.routers.better-issues-web.entrypoints=websecure"
      - "traefik.http.routers.better-issues-web.tls=true"
      - "traefik.http.routers.better-issues-web.service=better-issues-web"
      - "traefik.http.services.better-issues-web.loadbalancer.server.port=4100"
    networks:
      - dokploy-network
    expose:
      - "4100"
    environment:
      CONVEX_SELF_HOSTED_URL: http://backend:3210
      CONVEX_SELF_HOSTED_ADMIN_KEY: ${CONVEX_SELF_HOSTED_ADMIN_KEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SITE_URL: ${SITE_URL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4100/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  data:

networks:
  dokploy-network:
    external: true
