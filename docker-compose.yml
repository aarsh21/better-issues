services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_URL: ${APP_URL:-http://localhost:3001}
      API_URL: ${API_URL:-http://localhost:3002}
      DATABASE_URL: ${DATABASE_URL:-file:/data/better-issues.sqlite}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN}
      ALLOWED_SIGNUPS: ${ALLOWED_SIGNUPS:-true}
    volumes:
      - sqlite_data:/data
    ports:
      - "3002:3002"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 4100
      API_URL: http://api:3002
      VITE_ALLOWED_SIGNUPS: ${ALLOWED_SIGNUPS:-true}
    depends_on:
      - api
    ports:
      - "3001:4100"

volumes:
  sqlite_data:
