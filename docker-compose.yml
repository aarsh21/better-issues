# ── better-issues: Full Stack ──────────────────────────────────
#
# One command to run everything:
#   docker compose up --build -d
#
# Required env vars (set in Dokploy Environment tab or .env file):
#   INSTANCE_SECRET       - openssl rand -hex 32
#   DB_PASSWORD           - openssl rand -hex 16
#   BETTER_AUTH_SECRET    - openssl rand -hex 32
#   CONVEX_CLOUD_ORIGIN   - External URL for Convex API  (e.g. https://convex.yourdomain.com)
#   CONVEX_SITE_ORIGIN    - External URL for Convex site (e.g. https://convex-site.yourdomain.com)
#   SITE_URL              - External URL for the web app  (e.g. https://issues.yourdomain.com)
#
# No manual admin key step. The keygen service auto-generates it.
# ───────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: convex_self_hosted
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Convex Backend ────────────────────────────────────────
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    networks:
      - app
    ports:
      - "${CONVEX_PORT:-3210}:3210"
      - "${CONVEX_SITE_PORT:-3211}:3211"
    volumes:
      - convex_data:/convex/data
    environment:
      INSTANCE_NAME: better-issues
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      POSTGRES_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/convex_self_hosted
      DO_NOT_REQUIRE_SSL: "1"
      RUST_LOG: ${RUST_LOG:-info}
      DISABLE_BEACON: "true"
      DOCUMENT_RETENTION_DELAY: "172800"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 30s
      retries: 10

  # ─── Convex Dashboard ──────────────────────────────────────
  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    restart: unless-stopped
    networks:
      - app
    ports:
      - "${DASHBOARD_PORT:-6791}:6791"
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
    depends_on:
      convex:
        condition: service_healthy

  # ─── Admin Key Generator (runs once, writes to shared volume) ──
  keygen:
    image: ghcr.io/get-convex/convex-backend:latest
    networks:
      - app
    volumes:
      - admin_key:/key
    environment:
      INSTANCE_NAME: better-issues
      INSTANCE_SECRET: ${INSTANCE_SECRET}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cd /convex
        ./generate_admin_key.sh 2>/dev/null | tail -1 | tr -d '\n' > /key/admin_key
        if [ -s /key/admin_key ]; then
          echo "==> Admin key generated successfully"
        else
          echo "!!! Failed to generate admin key. Raw output:"
          ./generate_admin_key.sh
          exit 1
        fi

  # ─── Deploy Convex Functions (runs once, then exits) ───────
  convex-deploy:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    networks:
      - app
    volumes:
      - admin_key:/key:ro
    environment:
      CONVEX_SELF_HOSTED_URL: http://convex:3210
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
    depends_on:
      convex:
        condition: service_healthy
      keygen:
        condition: service_completed_successfully

  # ─── Next.js Frontend ──────────────────────────────────────
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_CONVEX_URL: ${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
        NEXT_PUBLIC_CONVEX_SITE_URL: ${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
    networks:
      - app
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    depends_on:
      convex-deploy:
        condition: service_completed_successfully

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  convex_data:
  admin_key:
